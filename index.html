<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
width:100%;
height:100%;

}
video{

</video>

</html>
